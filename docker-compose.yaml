services:
  argus-forge:
    build:
      context: .
      # hatch-vcs can't read git history from the build context (.git is
      # ignored) — hand the version in. Release images get the tag; local
      # builds get the 0.0.0+local default, which /health reports verbatim so a
      # dev image is never mistaken for a tagged one.
      args:
        VERSION: ${FORGE_VERSION:-0.0.0+local}
      # `runtime` (default) is the thin config-renderer; `train` bakes in the
      # trainer stack (torch CUDA wheels + kohya sd-scripts, multi-GB build) so
      # POST /run can go live on a GPU host — see README "Training image".
      target: ${FORGE_BUILD_TARGET:-runtime}
    # Distinct image name per target: without this both variants share the one
    # compose-derived tag, and a later `docker compose up` *without* --build
    # silently reuses whichever was built last — unsetting FORGE_BUILD_TARGET
    # alone would not bring the thin image back.
    image: argus-forge:${FORGE_BUILD_TARGET:-runtime}-local
    ports:
      - "${FORGE_PORT:-8103}:8103"
    environment:
      # Containment root for request-supplied export_dir paths. Required — the
      # API refuses every /inspect, /config and /run without it.
      ARGUS_FORGE_EXPORT_ROOT: /data/out
      # Demo-safe mode: /config renders (dry-run only) and POST /run is refused
      # with 403. Defaults ON because this image ships no trainer — no torch, no
      # sd-scripts — so a run could only ever fail, and the port is published on
      # 0.0.0.0 where a run would be real code execution on the host (see
      # runner.py's trust note). Set to 0 only once you have mounted a trainer.
      ARGUS_FORGE_READONLY: ${ARGUS_FORGE_READONLY:-1}
      # Browser origins allowed to call the API (comma-separated). These are
      # *added* to the localhost:3000 studio frontend that --cors allows.
      # FORGE_CORS_ORIGINS: https://studio.example.com
      # Rewrite the container paths forge renders into the host paths the
      # trainer will actually open, as container=host. Emitted configs name
      # /data/out/...; a trainer running on the host needs your real directory.
      # e.g. FORGE_PATH_MAP=/data/out=/home/me/argus/out. Empty = no rewriting.
      FORGE_PATH_MAP: ${FORGE_PATH_MAP:-}
      # Where the trainer checkout lives, for POST /run. Irrelevant in readonly
      # mode. The train image bakes SD_SCRIPTS_DIR=/opt/sd-scripts already; for
      # the thin image, mount a checkout and uncomment.
      # SD_SCRIPTS_DIR: /opt/sd-scripts
    volumes:
      # The curator export dir forge reads, and writes <export>/forge/ into.
      # Must be the same data the UI names in its request paths.
      - ${FORGE_OUTPUT_PATH:-./out}:/data/out
      # Train target: keep the multi-GB Hugging Face base-checkpoint download
      # across container recreations — uncomment this and the `volumes:` block
      # at the bottom (mirrors the README's `-v hf-cache:...` for docker run).
      # - hf-cache:/root/.cache/huggingface
    # Trainer dataloaders stage batches in /dev/shm (sd-scripts defaults to 8
    # workers) and docker's default is 64 MB — without this a live run dies
    # mid-epoch with "DataLoader worker killed by Bus error". Harmless for the
    # thin runtime target, so set unconditionally; mirrors the README
    # docker-run's --shm-size=8g.
    shm_size: "8g"
    # PID-1 reaper: cancelled runs kill the trainer's process group, and
    # dataloader workers orphaned in that window re-parent to PID 1 (uvicorn),
    # which never reaps non-asyncio children — zombies for the container's
    # lifetime without an init.
    init: true
    # Live training (train target + ARGUS_FORGE_READONLY=0) needs the GPU
    # passed through — uncomment (requires nvidia-container-toolkit):
    # gpus: all
    restart: unless-stopped

# Uncomment together with the hf-cache mount above.
# volumes:
#   hf-cache:
