# argus-forge training config for kohya sd-scripts (pass via --config_file)
# Seeded from argus-curator selection insights (setting, 30 images).
# Starting points, not gospel — watch samples and stop early if it overfits.

pretrained_model_name_or_path = "stabilityai/stable-diffusion-xl-base-1.0"
output_dir = "/data/out/forge/kohya/output"
output_name = "myset-lora"
save_model_as = "safetensors"
save_every_n_epochs = 1
save_precision = "bf16"

max_train_epochs = 10
train_batch_size = 2
seed = 42
mixed_precision = "bf16"

network_module = "networks.lora"
network_dim = 32
network_alpha = 16

learning_rate = 0.0001
unet_lr = 0.0001
text_encoder_lr = 5e-05
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 52
min_snr_gamma = 5

gradient_checkpointing = true
cache_latents = true
sdpa = true
# SDXL's fp16 VAE is numerically unstable; keep it in fp32.
no_half_vae = true
logging_dir = "/data/out/forge/kohya/logs"
